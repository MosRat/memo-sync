name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-desktop:
    name: Windows Desktop Bundle
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust remote compile cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: windows-release

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir apps/desktop install --frozen-lockfile

      - name: Build Tauri desktop bundle
        run: pnpm --dir apps/desktop exec tauri build

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: memo-sync-windows
          path: target/release/bundle/**
          if-no-files-found: error
          retention-days: 30

      - name: Show Rust remote compile cache stats
        if: always()
        shell: bash
        run: |
          "${SCCACHE_PATH}" --show-stats

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Rust remote compile cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: android-release-aarch64

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Configure Android SDK
        shell: bash
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Install Android packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.0.12433566"

      - name: Configure Android release signing
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
        run: |
          test -n "$ANDROID_RELEASE_KEYSTORE_BASE64"
          test -n "$ANDROID_RELEASE_KEY_ALIAS"
          test -n "$ANDROID_RELEASE_KEY_PASSWORD"
          test -n "$ANDROID_RELEASE_STORE_PASSWORD"

          android_project="apps/desktop/src-tauri/gen/android"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$android_project/upload-keystore.jks"
          chmod 600 "$android_project/upload-keystore.jks"
          {
            printf 'storeFile=upload-keystore.jks\n'
            printf 'storePassword=%s\n' "$ANDROID_RELEASE_STORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_RELEASE_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_RELEASE_KEY_PASSWORD"
          } > "$android_project/keystore.properties"
          chmod 600 "$android_project/keystore.properties"

      - name: Install frontend dependencies
        run: pnpm --dir apps/desktop install --frozen-lockfile

      - name: Build Android release APK
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.0.12433566
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.0.12433566
        run: |
          chmod +x apps/desktop/src-tauri/gen/android/gradlew
          pnpm --dir apps/desktop exec tauri android build --target aarch64 --apk --ci

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: memo-sync-android
          path: apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Show Rust remote compile cache stats
        if: always()
        shell: bash
        run: |
          "${SCCACHE_PATH}" --show-stats

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [windows-desktop, android-apk]

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate checksums
        shell: bash
        run: |
          find release-artifacts -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's# release-artifacts/[^/]*/# #' \
            > release-artifacts/SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Memo Sync ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: true
          files: release-artifacts/**
