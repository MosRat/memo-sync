name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-and-tests:
    name: Desktop, Frontend, and Rust Tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir apps/desktop install --frozen-lockfile

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run lightweight renderer clippy
        run: cargo clippy -p memo-render --no-default-features --all-targets -- -D warnings

      - name: Run Rust workspace tests
        run: cargo test --workspace

      - name: Run lightweight renderer tests
        run: cargo test -p memo-render --no-default-features

      - name: Run frontend tests
        run: pnpm --dir apps/desktop test

      - name: Build frontend
        run: pnpm --dir apps/desktop build

  android-build:
    name: Android AArch64 Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: android-aarch64

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Configure Android SDK
        shell: bash
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/desktop/src-tauri/gen/android/**/*.gradle*', 'apps/desktop/src-tauri/gen/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Android packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.0.12433566"

      - name: Install frontend dependencies
        run: pnpm --dir apps/desktop install --frozen-lockfile

      - name: Build Android APK
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.0.12433566
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.0.12433566
        run: |
          chmod +x apps/desktop/src-tauri/gen/android/gradlew
          pnpm --dir apps/desktop exec tauri android build --target aarch64 --apk --ci

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: memo-sync-android-aarch64
          path: apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14
